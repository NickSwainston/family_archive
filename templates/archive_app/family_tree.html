{% extends 'archive_app/navbar.html' %}

{% load static %}

{% block content %}
<style>
    #tree-wrap {
        width: 100%;
        height: calc(100vh - 56px);
        background-color: #f0f4f8 !important;
    }
    #tree {
        width: 100%;
        height: 100%;
        background-color: #f0f4f8 !important;
    }
</style>
<script src="{% static 'familytree.js' %}"></script>
<div id="tree-wrap">
    <div id="tree"></div>
</div>
<script>
    // ---- Base template ----
    FamilyTree.templates.swainston = Object.assign({}, FamilyTree.templates.tommy);
    FamilyTree.templates.swainston.size = [240, 190];

    FamilyTree.templates.swainston.defs =
        '<g transform="matrix(0.05,0,0,0.05,-12,-9)" id="heart">'
        + '<path fill="var(--heartcolour)" d="M438.482,58.61c-24.7-26.549-59.311-41.655-95.573-41.711c-36.291,0.042-70.938,15.14-95.676,41.694l-8.431,8.909l-8.431-8.909C181.284,5.762,98.663,2.728,45.832,51.815c-2.341,2.176-4.602,4.436-6.778,6.778c-52.072,56.166-52.072,142.968,0,199.134l187.358,197.581c6.482,6.843,17.284,7.136,24.127,0.654c0.224-0.212,0.442-0.43,0.654-0.654l187.29-197.581C490.551,201.567,490.551,114.77,438.482,58.61z"/>'
        + '</g>';

    FamilyTree.templates.swainston.ripple = { radius: 100, color: "#c8d0e8", rect: null };

    // Name — Georgia serif, prominent at top
    FamilyTree.templates.swainston.field_0 =
        '<text style="font-size: 14px; font-weight: bold; font-family: Georgia, serif;" fill="#ffffff" x="120" y="27" text-anchor="middle">{val}</text>';
    // Birth date — bottom left with "b." prefix
    FamilyTree.templates.swainston.field_1 =
        '<text style="font-size: 10px; font-family: sans-serif;" fill="rgba(255,255,255,0.8)" x="60" y="170" text-anchor="middle">b. {val}</text>';
    // Death date — bottom right with "d." prefix
    FamilyTree.templates.swainston.field_2 =
        '<text style="font-size: 10px; font-family: sans-serif;" fill="rgba(255,255,255,0.8)" x="180" y="170" text-anchor="middle">d. {val}</text>';

    // Circular photo with a subtle ring
    FamilyTree.templates.swainston.img_0 =
        '<clipPath id="swClip">'
        + '<circle cx="120" cy="97" r="52"></circle>'
        + '</clipPath>'
        + '<circle cx="120" cy="97" r="54" fill="rgba(255,255,255,0.15)"></circle>'
        + '<image preserveAspectRatio="xMidYMid slice" clip-path="url(#swClip)" xlink:href="{val}" x="68" y="45" width="104" height="104">'
        + '</image>';

    // Three-dot node menu (replaces the three lines)
    FamilyTree.templates.swainston.nodeMenuButton =
        '<g style="cursor:pointer;" transform="matrix(1,0,0,1,87,10)" data-ctrl-n-menu-id="{id}">'
        + '<rect x="-4" y="-4" fill="#000000" fill-opacity="0" width="22" height="18"></rect>'
        + '<circle cx="0"  cy="5" r="2.2" fill="rgba(255,255,255,0.75)"/>'
        + '<circle cx="7"  cy="5" r="2.2" fill="rgba(255,255,255,0.75)"/>'
        + '<circle cx="14" cy="5" r="2.2" fill="rgba(255,255,255,0.75)"/>'
        + '</g>';

    // Hamburger menu button styled to match brand blue
    FamilyTree.templates.swainston.menuButton =
        '<div style="position:absolute;right:{p}px;top:{p}px;width:36px;height:44px;cursor:pointer;background:rgba(35,42,156,0.9);border-radius:6px;padding:10px 7px;box-sizing:border-box;" data-ctrl-menu="">'
        + '<hr style="background-color:rgba(255,255,255,0.9);height:2px;border:none;margin:4px 0;">'
        + '<hr style="background-color:rgba(255,255,255,0.9);height:2px;border:none;margin:4px 0;">'
        + '<hr style="background-color:rgba(255,255,255,0.9);height:2px;border:none;margin:4px 0;">'
        + '</div>';

    // Navigation pointer arrows
    FamilyTree.templates.swainston.pointer =
        '<g data-pointer="pointer" transform="matrix(0,0,0,0,100,100)"><g transform="matrix(0.3,0,0,0.3,-17,-17)">'
        + '<polygon fill="rgba(255,255,255,0.9)" points="53.004,173.004 53.004,66.996 0,120"/>'
        + '<polygon fill="rgba(255,255,255,0.9)" points="186.996,66.996 186.996,173.004 240,120"/>'
        + '<polygon fill="rgba(255,255,255,0.9)" points="66.996,53.004 173.004,53.004 120,0"/>'
        + '<polygon fill="rgba(255,255,255,0.9)" points="120,240 173.004,186.996 66.996,186.996"/>'
        + '<circle fill="rgba(255,255,255,0.9)" cx="120" cy="120" r="30"/>'
        + '</g></g>';

    // Male card — navy with lighter blue top accent + drop shadow
    FamilyTree.templates.swainston_male = Object.assign({}, FamilyTree.templates.swainston);
    FamilyTree.templates.swainston_male.node =
        '<rect x="2" y="3" height="{h}" width="{w}" fill="rgba(0,0,0,0.18)" rx="10" ry="10"></rect>'
        + '<rect x="0" y="0" height="{h}" width="{w}" fill="#232a9c" rx="10" ry="10"></rect>'
        + '<rect x="0" y="0" height="12" width="{w}" fill="#4a56d4" rx="10" ry="10"></rect>'
        + '<rect x="0" y="6"  height="8"  width="{w}" fill="#4a56d4"></rect>';

    // Female card — purple with lighter purple top accent + drop shadow
    FamilyTree.templates.swainston_female = Object.assign({}, FamilyTree.templates.swainston);
    FamilyTree.templates.swainston_female.node =
        '<rect x="2" y="3" height="{h}" width="{w}" fill="rgba(0,0,0,0.18)" rx="10" ry="10"></rect>'
        + '<rect x="0" y="0" height="{h}" width="{w}" fill="#603F8B" rx="10" ry="10"></rect>'
        + '<rect x="0" y="0" height="12" width="{w}" fill="#8a60b8" rx="10" ry="10"></rect>'
        + '<rect x="0" y="6"  height="8"  width="{w}" fill="#8a60b8"></rect>';

    // ---- Tree initialisation ----
    var family = new FamilyTree(document.getElementById("tree"), {
        template: "swainston",

        // Scroll options
        showXScroll: FamilyTree.scroll.visible,
        showYScroll: FamilyTree.scroll.visible,
        mouseScrool: FamilyTree.action.zoom,

        // Shown fields
        nodeBinding: {
            field_0: "name",
            field_1: "birthDate",
            field_2: "deathDate",
            img_0:   "image",
        },

        // Layout separations
        levelSeparation: 80,
        siblingSeparation: 20,
        subtreeSeparation: 40,

        {% if roots %}roots: [{{ roots|join:", " }}],{% endif %}

        nodes: [
            {% for member in family_members %}
                {{ member|safe }}
            {% endfor %}
        ]
    });

    family.on('expcollclick', function (sender, isCollapsing, nodeId) {
        var node = family.getNode(nodeId);
        if (isCollapsing) {
            family.expandCollapse(nodeId, [], node.ftChildrenIds);
        } else {
            family.expandCollapse(nodeId, node.ftChildrenIds, []);
        }
        return false;
    });

    family.on('render-link', function(sender, args) {
        if (args.cnode.ppid != undefined)
            args.html += '<use data-ctrl-ec-id="' + args.node.id + '" xlink:href="#heart" x="' + args.p.xb + '" y="' + args.p.ya + '"/>';
        if (args.cnode.isPartner && args.node.partnerSeparation == 30)
            args.html += '<use data-ctrl-ec-id="' + args.node.id + '" xlink:href="#heart" x="' + args.p.xb + '" y="' + args.p.yb + '"/>';
    });
</script>
{% endblock %}
